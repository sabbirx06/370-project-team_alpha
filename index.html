<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Habitcents</title>

    <!-- Google Fonts -->

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
      rel="stylesheet"
    />

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" href="media/favicon.svg" type="image/svg+xml" />
  </head>

  <body>
    <!--Navbar-->
    <div class="container-fluid navbar-container">
      <nav class="navbar navbar-expand navbar-dark bg-dark">
        <a class="navbar-brand" href="index.html">Habitcents</a>
        <ul class="navbar-nav ms-auto">
          <li class="nav-item nav-signup d-flex gap-2">
            <button
              type="button"
              class="btn btn-primary"
              onclick="window.location.href = 'signup.html'"
            >
              Sign Up
            </button>
            <button
              type="button"
              class="btn btn-outline-light"
              onclick="window.location.href = 'login.html'"
            >
              Login
            </button>
          </li>
        </ul>
      </nav>
    </div>

    <!-- Hero Section -->
    <div class="container-fluid hero-bg">
      <div class="hero-text align-items-center text-center">
        <img src="media/logo.png" alt="Habitcents logo" class="logo-dash" />
        <h1 class="main-heading">Habitcents</h1>
        <p class="text-dash">
          Welcome to Habitcents! <br />
          Your personal habit and expense tracker
        </p>
        <button
          type="button"
          class="btn btn-primary btn-lg btn-get-started mt-4"
          onclick="window.location.href = 'signup.html'"
        >
          Get Started
        </button>
        <div class="d-flex gap-3 justify-content-center mt-4">
          <a href="habits.html" class="btn btn-outline-light btn-lg">
            Go to Habits
          </a>
          <a href="expenses.html" class="btn btn-primary btn-lg">
            Go to Expenses
          </a>
        </div>
      </div>
    </div>

    <footer class="container-fluid">
      <div class="container text-center py-3">
        <p class="mb-0">Made with ❤️ by Mohammed Sabbir Ahmed</p>
      </div>
    </footer>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="index.js"></script>
  </body>
</html>
