<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>

    <!-- Google Fonts -->

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
      rel="stylesheet"
    />

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="dashboard.css" />
    <link rel="icon" href="media/favicon.svg" type="image/svg+xml" />
  </head>
  <body>
    <div class="container-fluid navbar-container">
      <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <!--Left-->
        <a class="navbar-brand" href="index.html">Habitcents</a>

        <!--Right-->
        <ul class="navbar-nav d-flex flex-row mx-auto gap-4">
          <li class="nav-item">
            <a class="nav-link active" href="dashboard.html">Dashboard</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="habits.html">Habits</a>
          </li>
          <li class="nav-item d-flex gap-2">
            <a class="nav-link" href="expenses.html">Expenses</a>
          </li>
        </ul>
      </nav>
    </div>

    <div class="container mt-5">
      <div class="row g-4">
        <div class="col-12">
          <div class="card p-5 habit-card text-center">
            <h2 id="greeting-text">Hello, User!</h2>

            <p class="mt-3 fs-5">
              You completed
              <span id="habit-progress">0/0</span> habits today
            </p>
          </div>
        </div>
      </div>
    </div>

    <div class="container mt-5">
      <div class="row g-4">
        <div class="col-12">
          <div class="card p-5 habit-card text-center">
            <h4>Remaining Budget</h4>
            <h2 id="dashboard-budget" class="mt-4 fs-1">৳ 0</h2>
          </div>
        </div>
      </div>
    </div>

    <div class="container mt-5 mb-4 d-flex justify-content-center gap-4">
      <a href="habits.html" class="btn btn-outline-success px-4">
        Add Habits
      </a>

      <a href="index.html" class="btn btn-outline-danger px-4"> Go to Home </a>

      <a href="expenses.html" class="btn btn-outline-warning px-4">
        Show Expenses
      </a>
    </div>

    <footer
      class="container-fluid d-flex justify-content-center align-items-flex-end"
    >
      <div class="container text-center py-3">
        <p class="mb-0">Made with ❤️ by Mohammed Sabbir Ahmed</p>
      </div>
    </footer>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="index.js"></script>
  </body>
</html>
